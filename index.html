<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花畑の朝</title>

<style>
.container{
    position: relative;
    width: 960px;
}

/* 背景 */
.bg{
    width: 960px;
    display: block;
}

/* メッセージ */
.message{
    position: absolute;
    top: 40px;
    left: 20px;

    background-color: rgba(255,255,255,0.7);
    padding: 15px;

    color: rgb(38, 223, 192);
    font-size: 20pt;
    font-weight: bold;
}

/* 蝶々 */
.b1{
    position: absolute;
    left: 160px;
    top: 410px;
    width: 70px;
}

.b2{
    position: absolute;
    left: 400px;
    top: 350px;
    width: 70px;
}

.b3{
    position: absolute;
    left: 600px;
    top: 435px;
    width: 70px;
}
</style>

</head>

<body>

<div class="container">

    <!-- 背景 -->
    <img src="bg0.png" class="bg" alt="背景">

    <!-- メッセージ -->
    <div class="message">
        ぽかぽか陽気の穏やかな朝<br>
        花畑では、蝶々がのんびり飛んでいます
    </div>

    <!-- 蝶 -->
    <img src="butterfly.gif" class="b1" alt="蝶">
    <img src="butterfly.gif" class="b2" alt="蝶">
    <img src="butterfly.gif" class="b3" alt="蝶">

</div>

</body>
</html>
